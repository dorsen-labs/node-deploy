[Eth]
NetworkId = 714
SyncMode = "full"
NoPruning = false
NoPrefetch = false
DatabaseCache = 512
DatabaseFreezer = ""
TrieCleanCache = 256
TrieDirtyCache = 256
TriesInMemory = 128
TrieTimeout = 150000000000
EnablePreimageRecording = false
EVNNodeIDsToAdd = []
RPCEVMTimeout = 5000000000

[Eth.Miner]
GasCeil = 70000000
GasPrice = 1000000000

[Eth.TxPool]
Locals = []
NoLocals = true
Journal = "transactions.rlp"
Rejournal = 3600000000000
PriceLimit = 1000000000
PriceBump = 10
AccountSlots = 200
GlobalSlots = 8000
AccountQueue = 200
GlobalQueue = 4000

[Eth.GPO]
Blocks = 20
Percentile = 60
OracleThreshold = 1000

[Node]
IPCPath = "geth.ipc"
HTTPHost = "0.0.0.0"
InsecureUnlockAllowed = true
HTTPPort = 8545
HTTPVirtualHosts = ["*"]
HTTPModules = ["eth", "net", "web3", "txpool", "parlia", "debug"]
WSHost = "0.0.0.0"
WSModules = ["net", "web3", "eth"]
WSPort = 8545
EnableQuickBlockFetching = true

[Node.P2P]
MaxPeers = 50
NoDiscovery = false
StaticNodes = []
TrustedNodes = []
EnableMsgEvents = false
EVNNodeIdsWhitelist = []
ProxyedValidatorAddresses = []

[Node.HTTPTimeouts]
ReadTimeout = 30000000000
ReadHeaderTimeout = 5000000000
WriteTimeout = 30000000000
IdleTimeout = 120000000000

[Node.LogConfig]
FilePath = "dorsen.log"
TimeFormat = "01-02|15:04:05.000"
MaxBackups = 2
MaxBytesSize = 10485760
Level = "info"
FileRoot = ""
